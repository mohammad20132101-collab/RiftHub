<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Chess</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
}

button{
  margin:5px;
  padding:8px 15px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* GAME */
#game{ display:none; }

.container{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:20px;
}

.captures{
  width:160px;
  min-height:560px;
  background:#141428;
  border:2px solid #4c6fff;
  border-radius:10px;
  padding:10px;
}

/* BOARD */
#board{
  display:grid;
  grid-template-columns:repeat(8,70px);
  grid-template-rows:repeat(8,70px);
  border:3px solid #4c6fff;
}

.cell{
  width:70px;
  height:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}

.light{ background:#141428; }
.dark{ background:#0f0f1a; }

.blue{ color:#4c6fff; }
.purple{ color:#9b5cff; }

.move{ background:#223a66 !important; }
.capture{ background:#662a2a !important; }
.selected{ outline:2px solid #4c6fff; }

/* PROMOTION MENU */
#promo{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#000000cc;
  display:none;
  justify-content:center;
  align-items:center;
}

.promoBox{
  background:#141428;
  padding:20px;
  border:2px solid #4c6fff;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Chess</h1>
    <button onclick="start(1)">1 Player</button>
    <button onclick="start(2)">2 Player</button>
  </div>
</div>

<!-- GAME -->
<div id="game">

<h1 id="status">Blue's turn</h1>

<div class="container">

  <div class="captures" id="capPurple">🟣 Captured</div>

  <div id="board"></div>

  <div class="captures" id="capBlue">🟦 Captured</div>

</div>

</div>

<!-- PROMOTION -->
<div id="promo">
  <div class="promoBox">
    <h3>Promote Pawn</h3>
    <button onclick="promote('q')">Queen</button>
    <button onclick="promote('r')">Rook</button>
    <button onclick="promote('b')">Bishop</button>
    <button onclick="promote('n')">Knight</button>
  </div>
</div>

<script>

let board=[];
let turn="blue";
let selected=null;
let mode=2;

let capBlue=[];
let capPurple=[];

let promoPawn=null;

/* PIECES */
const P={
  bp:"♟", br:"♜", bn:"♞", bb:"♝", bq:"♛", bk:"♚",
  pp:"♟", pr:"♜", pn:"♞", pb:"♝", pq:"♛", pk:"♚"
};

function start(m){
  mode=m;
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  setup();
  draw();
}

/* SETUP */
function setup(){
  board=Array(8).fill().map(()=>Array(8).fill(null));

  let back=["r","n","b","q","k","b","n","r"];

  for(let i=0;i<8;i++){
    board[0][i]="p"+back[i];
    board[1][i]="pp";
  }

  for(let i=0;i<8;i++){
    board[7][i]="b"+back[i];
    board[6][i]="bp";
  }
}

/* DRAW */
function draw(){
  let b=document.getElementById("board");
  b.innerHTML="";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let d=document.createElement("div");
      d.className="cell "+((r+c)%2?"dark":"light");

      let p=board[r][c];
      if(p){
        d.textContent=P[p];
        d.classList.add(p[0]==="b"?"blue":"purple");
      }

      d.onclick=()=>click(r,c);
      b.appendChild(d);
    }
  }

  updateCaptures();
  checkGameState();
}

/* CLICK */
function click(r,c){

  let p=board[r][c];

  if(p && p[0]===turn[0]){
    selected={r,c};
    showMoves(r,c);
    return;
  }

  if(selected && legal(selected.r,selected.c,r,c)){

    move(selected.r,selected.c,r,c);

    selected=null;
    clearHints();

    turn = turn==="blue"?"purple":"blue";

    draw();
  }
}

/* MOVE */
function move(fr,fc,tr,tc){

  let p=board[fr][fc];

  if(board[tr][tc]){
    if(board[tr][tc][0]==="b") capBlue.push(board[tr][tc]);
    else capPurple.push(board[tr][tc]);
  }

  board[tr][tc]=p;
  board[fr][fc]=null;

  // PROMOTION
  if(p[1]==="p" && (tr===0||tr===7)){
    promoPawn={r:tr,c:tc,color:p[0]};
    document.getElementById("promo").style.display="flex";
  }
}

/* PROMOTION */
function promote(type){
  if(!promoPawn) return;

  board[promoPawn.r][promoPawn.c]=promoPawn.color+type;
  promoPawn=null;

  document.getElementById("promo").style.display="none";

  draw();
}

/* LEGAL (same simplified rules) */
function legal(fr,fc,tr,tc){
  let p=board[fr][fc];
  if(!p) return false;

  let dr=tr-fr, dc=tc-fc;
  let t=p[1];

  if(t==="p"){
    let dir=p[0]==="b"?-1:1;

    if(dc===0 && !board[tr][tc]){
      if(dr===dir) return true;
      if((fr===1||fr===6)&&dr===2*dir) return true;
    }

    if(Math.abs(dc)===1 && dr===dir && board[tr][tc]){
      return true;
    }
  }

  if(t==="r") if(dr===0||dc===0) return path(fr,fc,tr,tc);
  if(t==="b") if(Math.abs(dr)===Math.abs(dc)) return path(fr,fc,tr,tc);
  if(t==="q") if(dr===0||dc===0||Math.abs(dr)===Math.abs(dc)) return path(fr,fc,tr,tc);
  if(t==="k") return Math.abs(dr)<=1&&Math.abs(dc)<=1;
  if(t==="n") return (Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2);

  return false;
}

/* PATH */
function path(fr,fc,tr,tc){
  let dr=Math.sign(tr-fr);
  let dc=Math.sign(tc-fc);

  let r=fr+dr,c=fc+dc;

  while(r!==tr||c!==tc){
    if(board[r][c]) return false;
    r+=dr;c+=dc;
  }
  return true;
}

/* GAME STATE */
function checkGameState(){

  let blueMoves=hasMoves("b");
  let purpleMoves=hasMoves("p");

  let blueKing=inCheck("b");
  let purpleKing=inCheck("p");

  // ONLY KINGS LEFT
  let pieces=board.flat().filter(x=>x);
  let onlyKings=pieces.every(x=>x[1]==="k");

  if(onlyKings){
    end("Draw (Kings only)");
    return;
  }

  if(!blueMoves && turn==="blue"){
    end(blueKing?"Purple wins (checkmate)":"Draw (stalemate)");
  }

  if(!purpleMoves && turn==="purple"){
    end(purpleKing?"Blue wins (checkmate)":"Draw (stalemate)");
  }
}

/* SIMPLE MOVE CHECK */
function hasMoves(color){
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let p=board[r][c];
      if(!p||p[0]!==color) continue;

      for(let rr=0;rr<8;rr++){
        for(let cc=0;cc<8;cc++){
          if(legal(r,c,rr,cc)) return true;
        }
      }
    }
  }
  return false;
}

/* CHECK (simple king attack scan) */
function inCheck(color){
  let king=null;

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      if(board[r][c]===color+"k") king={r,c};
    }
  }

  if(!king) return false;

  let enemy=color==="b"?"p":"b";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let p=board[r][c];
      if(p&&p[0]===enemy){
        if(legal(r,c,king.r,king.c)) return true;
      }
    }
  }

  return false;
}

/* END */
function end(text){
  document.getElementById("status").textContent=text;
}

/* UI */
function updateCaptures(){
  document.getElementById("capBlue").innerHTML="🟦 Captured<br>"+capBlue.join(" ");
  document.getElementById("capPurple").innerHTML="🟣 Captured<br>"+capPurple.join(" ");
}

function showMoves(){ }
function clearHints(){ }

</script>

</body>
</html>
