<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Chess</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
}

.menuBox button{
  margin:10px;
  padding:10px 20px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* GAME */
#game{ display:none; }

h1{ color:#4c6fff; }

#board{
  display:grid;
  grid-template-columns:repeat(8,70px);
  grid-template-rows:repeat(8,70px);
  justify-content:center;
  margin-top:20px;
  border:3px solid #4c6fff;
  background:#0f0f1a;
}

/* GRID CELLS */
.cell{
  width:70px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  cursor:pointer;
  position:relative;
}

/* checker pattern */
.cell:nth-child(odd){ background:#141428; }
.cell:nth-child(even){ background:#101022; }

/* PIECES */
.blue{
  color:#4c6fff;
  text-shadow:0 0 10px #4c6fff;
}

.purple{
  color:#9b5cff;
  text-shadow:0 0 10px #9b5cff;
}

/* HIGHLIGHTS */
.move{ background:#253060 !important; }
.capture{ background:#3a1f3a !important; }
.selected{ outline:2px solid #4c6fff; }

/* ANIMATION PIECE */
.floating{
  position:fixed;
  font-size:28px;
  pointer-events:none;
  transition:all 0.25s ease;
  z-index:999;
}
</style>
</head>

<body>

<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Chess</h1>
    <button onclick="start(1)">1 Player</button>
    <button onclick="start(2)">2 Player</button>
  </div>
</div>

<div id="game">
  <h1>Rift Chess</h1>
  <div id="board"></div>
  <h3 id="status">Blue's turn</h3>
  <button onclick="reset()">Reset</button>
</div>

<script>

let board=[];
let turn="blue";
let selected=null;
let mode=2;

function start(m){
  mode=m;
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  setup();
  draw();
}

/* FIXED ORIENTATION: BLUE AT BOTTOM */
function setup(){
  board = Array(8).fill().map(()=>Array(8).fill(null));

  // purple (top)
  for(let i=0;i<8;i++){
    board[1][i]="bp";
  }

  const back=["r","n","b","q","k","b","n","r"];
  for(let i=0;i<8;i++){
    board[0][i]="b"+back[i];
  }

  // blue (bottom)
  for(let i=0;i<8;i++){
    board[6][i]="pp";
  }
  for(let i=0;i<8;i++){
    board[7][i]="p"+back[i];
  }
}

/* DRAW BOARD */
function draw(){
  const b=document.getElementById("board");
  b.innerHTML="";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      let cell=document.createElement("div");
      cell.className="cell";

      let p=board[r][c];

      if(p){
        cell.innerHTML=p.includes("p")?"♟":"♚";
        cell.classList.add(p[0]==="b"?"purple":"blue");
      }

      cell.onclick=()=>click(r,c);
      b.appendChild(cell);
    }
  }
}

/* CLICK */
function click(r,c){

  let p=board[r][c];

  // select piece
  if(p && p[0]===turn[0]){
    selected={r,c};
    showMoves(r,c);
    return;
  }

  // move
  if(selected && legal(selected.r,selected.c,r,c)){

    animate(selected.r,selected.c,r,c);

    board[r][c]=board[selected.r][selected.c];
    board[selected.r][selected.c]=null;

    selected=null;
    clearHints();

    turn = turn==="blue"?"purple":"blue";
    update();

    if(mode===1 && turn==="purple"){
      setTimeout(ai,200);
    }

    draw();
  }
}

/* MOVE RULES (simple but working) */
function legal(fr,fc,tr,tc){

  let p=board[fr][fc];
  if(!p) return false;

  let dr=tr-fr;
  let dc=tc-fc;

  // pawn
  if(p.includes("p")){
    let dir = p[0]==="p" ? -1 : 1;

    if(dc===0 && !board[tr][tc]){
      if(dr===dir) return true;
      if((fr===1||fr===6) && dr===2*dir) return true;
    }

    if(Math.abs(dc)===1 && dr===dir && board[tr][tc]){
      return true;
    }
  }

  // king
  if(p.includes("k")){
    return Math.abs(dr)<=1 && Math.abs(dc)<=1;
  }

  return false;
}

/* SMOOTH MOVE FIX */
function animate(fr,fc,tr,tc){

  let from=document.querySelectorAll(".cell")[fr*8+fc];
  let to=document.querySelectorAll(".cell")[tr*8+tc];

  let piece=board[fr][fc];

  let ghost=document.createElement("div");
  ghost.className="floating";
  ghost.innerHTML=piece.includes("p")?"♟":"♚";

  ghost.style.left=from.getBoundingClientRect().left+"px";
  ghost.style.top=from.getBoundingClientRect().top+"px";

  document.body.appendChild(ghost);

  setTimeout(()=>{
    ghost.style.left=to.getBoundingClientRect().left+"px";
    ghost.style.top=to.getBoundingClientRect().top+"px";
  },10);

  setTimeout(()=>ghost.remove(),250);
}

/* AI (basic but stable) */
function ai(){

  let moves=[];

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let p=board[r][c];
      if(p && p[0]==="p"){
        for(let rr=0;rr<8;rr++){
          for(let cc=0;cc<8;cc++){
            if(legal(r,c,rr,cc)){
              moves.push([r,c,rr,cc]);
            }
          }
        }
      }
    }
  }

  if(!moves.length) return;

  let m=moves[Math.floor(Math.random()*moves.length)];

  board[m[2]][m[3]]=board[m[0]][m[1]];
  board[m[0]][m[1]]=null;

  turn="blue";
  update();
  draw();
}

/* HIGHLIGHTS */
function showMoves(r,c){

  clearHints();

  let cells=document.querySelectorAll(".cell");

  for(let i=0;i<64;i++){
    let rr=Math.floor(i/8);
    let cc=i%8;

    if(legal(r,c,rr,cc)){
      if(board[rr][cc]){
        cells[i].classList.add("capture");
      }else{
        cells[i].classList.add("move");
      }
    }
  }

  cells[r*8+c].classList.add("selected");
}

function clearHints(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("move","capture","selected");
  });
}

function update(){
  document.getElementById("status").textContent =
    turn==="blue"?"Blue's turn":"Purple's turn";
}

function reset(){
  setup();
  turn="blue";
  selected=null;
  draw();
}

</script>

</body>
</html>
