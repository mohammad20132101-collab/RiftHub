<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Chess</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
}

.menuBox button{
  margin:10px;
  padding:10px 20px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* LAYOUT */
#game{ display:none; }

.container{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  margin-top:20px;
}

/* CAPTURE PILES */
.captures{
  width:120px;
  min-height:560px;
  background:#141428;
  border:2px solid #4c6fff;
  border-radius:10px;
  padding:10px;
}

.capBlue{ color:#4c6fff; }
.capPurple{ color:#9b5cff; }

/* BOARD */
#board{
  display:grid;
  grid-template-columns:repeat(8,70px);
  grid-template-rows:repeat(8,70px);
  border:3px solid #4c6fff;
}

/* SQUARES */
.cell{
  width:70px;
  height:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}

.light{ background:#141428; }
.dark{ background:#0f0f1a; }

/* PIECES */
.blue{
  color:#4c6fff;
  text-shadow:0 0 10px #4c6fff;
}

.purple{
  color:#9b5cff;
  text-shadow:0 0 10px #9b5cff;
}

/* HIGHLIGHTS */
.move{ background:#263a66 !important; }
.capture{ background:#663030 !important; }
.selected{ outline:2px solid #4c6fff; }

/* BUTTON */
button{
  margin:5px;
  padding:8px 15px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:6px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Chess</h1>
    <button onclick="start(1)">1 Player</button>
    <button onclick="start(2)">2 Player</button>
  </div>
</div>

<!-- GAME -->
<div id="game">

<h1>Rift Chess</h1>

<div class="container">

  <div class="captures" id="capPurple">
    🟣 Purple Captures
  </div>

  <div id="board"></div>

  <div class="captures" id="capBlue">
    🟦 Blue Captures
  </div>

</div>

<h3 id="status">Blue's turn</h3>

<button onclick="reset()">Reset</button>
<button onclick="window.location.href='index.html'">Back</button>

</div>

<script>

let board=[];
let turn="blue";
let selected=null;
let mode=2;

let capBlue=[];
let capPurple=[];

/* PIECES */
const P = {
  bp:"♟", br:"♜", bn:"♞", bb:"♝", bq:"♛", bk:"♚",
  pp:"♟", pr:"♜", pn:"♞", pb:"♝", pq:"♛", pk:"♚"
};

function start(m){
  mode=m;
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  setup();
  draw();
}

/* SETUP */
function setup(){
  board = Array(8).fill().map(()=>Array(8).fill(null));

  const back=["r","n","b","q","k","b","n","r"];

  for(let i=0;i<8;i++){
    board[0][i]="p"+back[i];
    board[1][i]="pp";
  }

  for(let i=0;i<8;i++){
    board[7][i]="b"+back[i];
    board[6][i]="bp";
  }
}

/* DRAW */
function draw(){
  const b=document.getElementById("board");
  b.innerHTML="";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      let cell=document.createElement("div");
      cell.className="cell "+((r+c)%2?"dark":"light");

      let p=board[r][c];

      if(p){
        cell.textContent=P[p];
        cell.classList.add(p[0]==="b"?"blue":"purple");
      }

      cell.onclick=()=>click(r,c);
      b.appendChild(cell);
    }
  }

  updateCaptures();
}

/* CLICK */
function click(r,c){

  let p=board[r][c];

  if(p && p[0]===turn[0]){
    selected={r,c};
    showMoves(r,c);
    return;
  }

  if(selected && legal(selected.r,selected.c,r,c)){

    // CAPTURE LOGIC
    if(board[r][c]){
      if(board[r][c][0]==="b") capBlue.push(board[r][c]);
      else capPurple.push(board[r][c]);
    }

    board[r][c]=board[selected.r][selected.c];
    board[selected.r][selected.c]=null;

    selected=null;
    clearHints();

    turn = turn==="blue"?"purple":"blue";
    update();

    draw();

    if(mode===1 && turn==="purple"){
      setTimeout(ai,200);
    }
  }
}

/* LEGAL MOVES */
function legal(fr,fc,tr,tc){

  let p=board[fr][fc];
  if(!p) return false;

  let dr=tr-fr;
  let dc=tc-fc;

  let type=p[1];

  // pawn
  if(type==="p"){
    let dir=p[0]==="b"?-1:1;

    if(dc===0 && !board[tr][tc]){
      if(dr===dir) return true;
      if((fr===1||fr===6)&&dr===2*dir) return true;
    }

    if(Math.abs(dc)===1 && dr===dir && board[tr][tc]){
      return true;
    }
  }

  // rook
  if(type==="r"){
    if(dr===0||dc===0) return path(fr,fc,tr,tc);
  }

  // bishop
  if(type==="b"){
    if(Math.abs(dr)===Math.abs(dc)) return path(fr,fc,tr,tc);
  }

  // queen
  if(type==="q"){
    if(dr===0||dc===0||Math.abs(dr)===Math.abs(dc))
      return path(fr,fc,tr,tc);
  }

  // king
  if(type==="k"){
    return Math.abs(dr)<=1 && Math.abs(dc)<=1;
  }

  // knight
  if(type==="n"){
    return (Math.abs(dr)===2&&Math.abs(dc)===1)||
           (Math.abs(dr)===1&&Math.abs(dc)===2);
  }

  return false;
}

/* PATH */
function path(fr,fc,tr,tc){
  let dr=Math.sign(tr-fr);
  let dc=Math.sign(tc-fc);

  let r=fr+dr,c=fc+dc;

  while(r!==tr||c!==tc){
    if(board[r][c]) return false;
    r+=dr;c+=dc;
  }
  return true;
}

/* HIGHLIGHT */
function showMoves(r,c){
  clearHints();

  let cells=document.querySelectorAll(".cell");

  for(let i=0;i<64;i++){
    let rr=Math.floor(i/8);
    let cc=i%8;

    if(legal(r,c,rr,cc)){
      if(board[rr][cc]) cells[i].classList.add("capture");
      else cells[i].classList.add("move");
    }
  }

  cells[r*8+c].classList.add("selected");
}

function clearHints(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("move","capture","selected");
  });
}

/* CAPTURES UI */
function updateCaptures(){
  document.getElementById("capBlue").innerHTML =
    "🟦 Blue Captures<br>" + capBlue.map(p=>P[p]).join(" ");

  document.getElementById("capPurple").innerHTML =
    "🟣 Purple Captures<br>" + capPurple.map(p=>P[p]).join(" ");
}

/* AI (simple) */
function ai(){
  let moves=[];

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let p=board[r][c];
      if(p && p[0]==="p"){
        for(let rr=0;rr<8;rr++){
          for(let cc=0;cc<8;cc++){
            if(legal(r,c,rr,cc)){
              moves.push([r,c,rr,cc]);
            }
          }
        }
      }
    }
  }

  if(!moves.length) return;

  let m=moves[Math.floor(Math.random()*moves.length)];

  if(board[m[2]][m[3]]){
    if(board[m[2]][m[3]][0]==="b") capBlue.push(board[m[2]][m[3]]);
    else capPurple.push(board[m[2]][m[3]]);
  }

  board[m[2]][m[3]]=board[m[0]][m[1]];
  board[m[0]][m[1]]=null;

  turn="blue";
  update();
  draw();
}

/* STATUS */
function update(){
  document.getElementById("status").textContent=
    turn==="blue"?"Blue's turn":"Purple's turn";
}

/* RESET */
function reset(){
  setup();
  turn="blue";
  selected=null;
  capBlue=[];
  capPurple=[];
  draw();
}

</script>

</body>
</html>
