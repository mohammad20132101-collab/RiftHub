<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Connect 4</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f1a;
    color:white;
    text-align:center;
}

/* ===== START SCREEN ===== */
#startScreen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#menu{
    background:#141428;
    border:3px solid #4c6fff;
    border-radius:20px;
    padding:40px;
    width:350px;
    box-shadow:0 0 25px #4c6fff66;
}

#menu h1{
    margin-top:0;
    color:#4c6fff;
}

.modeBtn{
    width:100%;
    margin:8px 0;
    font-size:18px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#4c6fff;
    color:white;
}

.modeBtn.selected{
    background:#6e85ff;
    box-shadow:0 0 15px #4c6fff;
}

/* ===== GAME ===== */
h1{
    color:#4c6fff;
}

#board{
    display:grid;
    grid-template-columns:repeat(7,80px);
    gap:8px;
    justify-content:center;
    margin-top:20px;
    background:#141428;
    padding:15px;
    border-radius:15px;
    border:3px solid #4c6fff;
    box-shadow:0 0 20px #4c6fff55;
}

/* cell */
.cell{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#0f0f1a;
    cursor:pointer;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
}

/* pieces */
.p1{
    background:#4c6fff;
    box-shadow:0 0 15px #4c6fff;
}

.p2{
    background:#9b5cff;
    box-shadow:0 0 15px #9b5cff;
}

/* drop animation (no shake bug) */
.drop{
    animation:drop 0.2s ease;
}

@keyframes drop{
    from{transform:translateY(-120px);}
    to{transform:translateY(0);}
}

/* WIN LINE */
.winLine{
    position:absolute;
    height:6px;
    background:linear-gradient(90deg,#4c6fff,#9b5cff);
    box-shadow:0 0 15px #4c6fff;
    border-radius:10px;
    z-index:10;
}

#boardWrapper{
    position:relative;
    display:inline-block;
}
</style>
</head>

<body>

<!-- ===== START MENU ===== -->
<div id="startScreen">
    <div id="menu">
        <h1>Rift Connect 4</h1>
        <p>Select Mode</p>
        <button class="modeBtn" onclick="startGame(1)">1 Player</button>
        <button class="modeBtn" onclick="startGame(2)">2 Players</button>
    </div>
</div>

<h1>Rift Connect 4</h1>

<div id="boardWrapper">
    <div id="board"></div>
</div>

<p id="status"></p>

<script>

const ROWS = 6;
const COLS = 7;

let board = [];
let current = 1;
let mode = 2;
let gameOver = false;

const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");

/* ===== START GAME ===== */
function startGame(selectedMode){
    mode = selectedMode;
    document.getElementById("startScreen").style.display="none";
    init();
}

/* ===== INIT ===== */
function init(){
    board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
    current = 1;
    gameOver = false;
    draw();
    statusEl.textContent = "Player 1 starts";
}

/* ===== DRAW ===== */
function draw(){
    boardEl.innerHTML="";

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){

            let cell = document.createElement("div");
            cell.className="cell";

            if(board[r][c]===1) cell.classList.add("p1");
            if(board[r][c]===2) cell.classList.add("p2");

            cell.onclick=()=>play(c);

            boardEl.appendChild(cell);
        }
    }
}

/* ===== PLAY ===== */
function play(col){

    if(gameOver) return;

    for(let r=ROWS-1;r>=0;r--){
        if(board[r][col]===0){
            board[r][col]=current;

            draw();

            if(checkWin(r,col)){
                statusEl.textContent = "Player " + current + " wins!";
                drawWinLine();
                gameOver=true;
                return;
            }

            current = current===1 ? 2 : 1;
            statusEl.textContent = "Player " + current + "'s turn";

            return;
        }
    }
}

/* ===== WIN CHECK ===== */
function checkWin(r,c){

    let p = board[r][c];

    function count(dr,dc){
        let i=1;
        let rr=r+dr, cc=c+dc;
        while(rr>=0 && rr<ROWS && cc>=0 && cc<COLS && board[rr][cc]===p){
            i++; rr+=dr; cc+=dc;
        }
        return i;
    }

    return (
        count(0,1)+count(0,-1)-1>=4 ||
        count(1,0)+count(-1,0)-1>=4 ||
        count(1,1)+count(-1,-1)-1>=4 ||
        count(1,-1)+count(-1,1)-1>=4
    );
}

/* ===== WIN LINE ===== */
function drawWinLine(){
    let line = document.createElement("div");
    line.className="winLine";

    line.style.width="520px";
    line.style.top="50%";
    line.style.left="50%";
    line.style.transform="translate(-50%,-50%) rotate(0deg)";

    document.getElementById("boardWrapper").appendChild(line);
}

</script>

</body>
</html>
