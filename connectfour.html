<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Connect 4</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f1a;
    color:white;
    text-align:center;
}

/* ===== START MENU ===== */
#menu{
    position:absolute;
    width:100%;
    height:100%;
    background:#0f0f1a;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

.menuBox{
    background:#141428;
    padding:30px;
    border-radius:15px;
    border:3px solid #4c6fff;
    box-shadow:0 0 25px #4c6fff55;
}

.menuBox h1{
    color:#4c6fff;
    margin-bottom:10px;
}

.menuBox button{
    margin:8px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

#blueBtn{
    background:#4c6fff;
    color:white;
    box-shadow:0 0 15px #4c6fff55;
}

#purpleBtn{
    background:#9b5cff;
    color:white;
    box-shadow:0 0 15px #9b5cff55;
}

/* ===== GAME ===== */
#gameArea{
    display:none;
}

h1{
    color:#4c6fff;
}

/* BOARD */
#board{
    display:grid;
    grid-template-columns:repeat(7,80px);
    gap:8px;
    justify-content:center;
    margin-top:20px;
    background:#141428;
    padding:15px;
    border-radius:15px;
    border:3px solid #4c6fff;
    box-shadow:0 0 20px #4c6fff55;
}

/* CELLS */
.cell{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#0f0f1a;
    cursor:pointer;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
}

/* PIECES */
.player1{
    background:#4c6fff;
    box-shadow:0 0 15px #4c6fff;
}

.player2{
    background:#9b5cff;
    box-shadow:0 0 15px #9b5cff;
}

/* drop animation */
.drop{
    animation:drop 0.2s ease;
}

@keyframes drop{
    from{transform:translateY(-200px);}
    to{transform:translateY(0);}
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#4c6fff;
    color:white;
    margin:5px;
}
button:hover{
    background:#9b5cff;
}
</style>
</head>

<body>

<!-- ===== MENU ===== -->
<div id="menu">
    <div class="menuBox">
        <h1>🌀 Rift Connect 4</h1>
        <p>Choose your Rift alignment</p>
        <button id="blueBtn" onclick="startGame('player1')">Rift Blue</button>
        <button id="purpleBtn" onclick="startGame('player2')">Rift Purple</button>
    </div>
</div>

<!-- ===== GAME ===== -->
<div id="gameArea">

<h1>Rift Connect 4</h1>

<div id="board"></div>

<p id="status">Blue’s turn</p>

<button onclick="resetGame()">Reset</button>

</div>

<script>

const ROWS = 6;
const COLS = 7;

let board = [];
let currentPlayer = "player1";
let human = "player1";
let ai = "player2";
let gameOver = false;

const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");

/* ===== START GAME ===== */
function startGame(choice){

    human = choice;
    ai = (choice === "player1") ? "player2" : "player1";
    currentPlayer = "player1";

    document.getElementById("menu").style.display="none";
    document.getElementById("gameArea").style.display="block";

    initBoard();
}

/* ===== INIT BOARD ===== */
function initBoard(){
    board = Array.from({length:ROWS},()=>Array(COLS).fill(null));
    drawBoard();
}

/* ===== DRAW BOARD ===== */
function drawBoard(){

    boardEl.innerHTML="";

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){

            let cell = document.createElement("div");
            cell.classList.add("cell");

            cell.dataset.col = c;

            if(board[r][c]){
                cell.classList.add(board[r][c]);
                cell.classList.add("drop");
            }

            cell.onclick = ()=>play(c);

            boardEl.appendChild(cell);
        }
    }
}

/* ===== PLAY MOVE ===== */
function play(col){

    if(gameOver) return;
    if(currentPlayer !== human) return;

    for(let r=ROWS-1;r>=0;r--){
        if(!board[r][col]){
            board[r][col]=currentPlayer;
            break;
        }
    }

    drawBoard();

    if(checkWin(currentPlayer)){
        statusEl.textContent = currentPlayer + " wins!";
        gameOver=true;
        return;
    }

    currentPlayer = ai;
    statusEl.textContent = "Purple thinking...";

    setTimeout(aiMove,400);
}

/* ===== AI ===== */
function aiMove(){

    if(gameOver) return;

    let col;

    do{
        col = Math.floor(Math.random()*COLS);
    } while(board[0][col] !== null);

    for(let r=ROWS-1;r>=0;r--){
        if(!board[r][col]){
            board[r][col]=ai;
            break;
        }
    }

    drawBoard();

    if(checkWin(ai)){
        statusEl.textContent = ai + " wins!";
        gameOver=true;
        return;
    }

    currentPlayer = human;
    statusEl.textContent = "Your turn";
}

/* ===== WIN CHECK ===== */
function checkWin(p){

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){

            if(
                c+3<COLS &&
                board[r][c]==p &&
                board[r][c+1]==p &&
                board[r][c+2]==p &&
                board[r][c+3]==p
            ) return true;

            if(
                r+3<ROWS &&
                board[r][c]==p &&
                board[r+1][c]==p &&
                board[r+2][c]==p &&
                board[r+3][c]==p
            ) return true;

            if(
                r+3<ROWS && c+3<COLS &&
                board[r][c]==p &&
                board[r+1][c+1]==p &&
                board[r+2][c+2]==p &&
                board[r+3][c+3]==p
            ) return true;

            if(
                r-3>=0 && c+3<COLS &&
                board[r][c]==p &&
                board[r-1][c+1]==p &&
                board[r-2][c+2]==p &&
                board[r-3][c+3]==p
            ) return true;
        }
    }

    return false;
}

/* ===== RESET ===== */
function resetGame(){
    gameOver=false;
    currentPlayer="player1";
    initBoard();
    statusEl.textContent="Blue’s turn";
}

</script>

</body>
</html>
