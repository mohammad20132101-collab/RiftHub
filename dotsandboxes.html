<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Dots & Boxes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
}

.menuBox h1{ color:#4c6fff; }

.menuBox button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#4c6fff;
  color:white;
  cursor:pointer;
}

/* GAME */
#gameArea{ display:none; }

h1{ color:#4c6fff; }

#score{
  margin:10px;
  font-weight:bold;
}

/* BOARD */
#board{
  display:grid;
  justify-content:center;
  margin:auto;
  width:95vw;
  max-width:650px;

  /* GRID SIZE */
  grid-template-columns:repeat(9, 1fr);
  grid-auto-rows:60px;
  gap:0;
  background:#050814;
  border:3px solid #4c6fff;
  border-radius:12px;
  padding:10px;
}

/* DOT */
.dot{
  background:transparent;
  position:relative;
}

/* LINE CELLS */
.h-line, .v-line{
  background:rgba(255,255,255,0.03);
  cursor:pointer;
  transition:0.1s;
}

.h-line:hover, .v-line:hover{
  background:rgba(76,108,255,0.2);
}

/* FILLED LINES */
.blue{
  background:#4c6fff !important;
}

.purple{
  background:#a046ff !important;
}

/* BOXES */
.box{
  background:transparent;
}

.box.blue{
  background:rgba(76,108,255,0.2);
}

.box.purple{
  background:rgba(160,70,255,0.2);
}

/* BUTTONS (your style) */
button{
  margin:5px;
  padding:8px 15px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🟦🟪 Rift Dots & Boxes</h1>
    <button onclick="startGame(1)">1 Player</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>

<!-- GAME -->
<div id="gameArea">

<h1>Rift Dots & Boxes</h1>
<div id="score"></div>

<div id="board"></div>

<div>
  <button onclick="reset()">Restart</button>
</div>

</div>

<script>

/* ======================
   PURE DOM ENGINE (NO MATH BUGS)
   ====================== */

const board = document.getElementById("board");

const N = 4; // boxes per row

let mode = 2;
let turn = 0; // 0 blue, 1 purple
let blue = 0;
let purple = 0;

/* STATE */
let h = [];
let v = [];
let boxes = [];

/* ======================
   INIT
   ====================== */

function startGame(m){
  mode = m;
  document.getElementById("menu").style.display="none";
  document.getElementById("gameArea").style.display="block";

  setup();
  render();
  update();
}

function setup(){
  h = Array(N+1).fill().map(()=>Array(N).fill(null));
  v = Array(N).fill().map(()=>Array(N+1).fill(null));
  boxes = Array(N).fill().map(()=>Array(N).fill(null));

  turn = 0;
  blue = 0;
  purple = 0;
}

/* ======================
   BUILD GRID (FIXED CELLS)
   ====================== */

function render(){
  board.innerHTML="";

  for(let y=0;y<2*N+1;y++){
    for(let x=0;x<2*N+1;x++){

      // DOTS
      if(x%2===0 && y%2===0){
        let d=document.createElement("div");
        d.className="dot";
        board.appendChild(d);
      }

      // HORIZONTAL LINES
      else if(y%2===0){
        let hx=(x-1)/2;
        let hy=y/2;

        let el=document.createElement("div");
        el.className="h-line";

        if(h[hy][hx]) el.classList.add(h[hy][hx]);

        el.onclick=()=>placeH(hy,hx,el);

        board.appendChild(el);
      }

      // VERTICAL LINES
      else if(x%2===0){
        let vx=x/2;
        let vy=(y-1)/2;

        let el=document.createElement("div");
        el.className="v-line";

        if(v[vy][vx]) el.classList.add(v[vy][vx]);

        el.onclick=()=>placeV(vy,vx,el);

        board.appendChild(el);
      }

      // BOXES
      else{
        let bx=(x-1)/2;
        let by=(y-1)/2;

        let el=document.createElement("div");
        el.className="box";

        if(boxes[by][bx]===0) el.classList.add("blue");
        if(boxes[by][bx]===1) el.classList.add("purple");

        board.appendChild(el);
      }
    }
  }
}

/* ======================
   PLACE H LINE
   ====================== */

function placeH(y,x,el){

  if(h[y][x]!==null) return;

  h[y][x]=turn;

  el.classList.add(turn===0?"blue":"purple");

  next();
}

/* ======================
   PLACE V LINE
   ====================== */

function placeV(y,x,el){

  if(v[y][x]!==null) return;

  v[y][x]=turn;

  el.classList.add(turn===0?"blue":"purple");

  next();
}

/* ======================
   TURN SYSTEM (IMPOSSIBLE TO DESYNC NOW)
   ====================== */

function next(){

  let scored=checkBoxes();

  if(!scored){
    turn = 1 - turn;
  }

  update();
}

/* ======================
   BOX CHECK
   ====================== */

function checkBoxes(){

  let scored=false;

  for(let y=0;y<N;y++){
    for(let x=0;x<N;x++){

      if(boxes[y][x]!==null) continue;

      if(
        h[y][x] &&
        h[y+1][x] &&
        v[y][x] &&
        v[y][x+1]
      ){
        boxes[y][x]=turn;

        if(turn===0) blue++;
        else purple++;

        scored=true;
      }
    }
  }

  if(scored) render();

  return scored;
}

/* ======================
   UI
   ====================== */

function update(){
  document.getElementById("score").textContent =
  `Blue: ${blue} | Purple: ${purple} | Turn: ${turn===0?"Blue":"Purple"}`;
}

function reset(){
  setup();
  render();
  update();
}

</script>

</body>
</html>
