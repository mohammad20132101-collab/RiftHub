<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Draw Score</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

h1{
  color:#4c6fff;
  text-shadow:0 0 10px #4c6fff;
  margin-top:10px;
}

#hub{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#141428;
  border:2px solid #4c6fff;
  color:white;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 12px #4c6fff;
}

#score{
  font-size:20px;
  margin:10px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99;
}

canvas{
  background:#141428;
  border:3px solid #4c6fff;
  border-radius:10px;
  box-shadow:0 0 20px #4c6fff33;
}
</style>
</head>

<body>

<h1>🌀 Rift Draw Accuracy Game</h1>

<div id="hub">
  <button onclick="setMode('circle')">Circle</button>
  <button onclick="setMode('square')">Square</button>
  <button onclick="setMode('triangle')">Triangle</button>
  <button onclick="clearCanvas()">Clear</button>
</div>

<div id="score">Score: 0%</div>

<canvas id="c" width="500" height="500"></canvas>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let drawing = false;
let points = [];
let mode = "circle";
let score = 0;

let center = {x:250, y:250};

function setMode(m){
  mode = m;
  clearCanvas();
}

function clearCanvas(){
  ctx.clearRect(0,0,500,500);
  points = [];
  score = 0;
  updateScore(0);
}

/* DRAW HANDLING */
canvas.addEventListener("mousedown", ()=> drawing=true);
canvas.addEventListener("mouseup", ()=> drawing=false);

canvas.addEventListener("mousemove", function(e){
  if(!drawing) return;

  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  points.push({x,y});

  ctx.fillStyle="#4c6fff";
  ctx.beginPath();
  ctx.arc(x,y,2,0,Math.PI*2);
  ctx.fill();

  calculateScore();
});

/* SCORE SYSTEM */
function calculateScore(){

  if(points.length < 10) return;

  let error = 0;

  if(mode === "circle"){
    error = circleError();
  }

  if(mode === "square"){
    error = squareError();
  }

  if(mode === "triangle"){
    error = triangleError();
  }

  score = Math.max(0, Math.round(100 - error));
  updateScore(score);
}

/* 🔵 CIRCLE ERROR */
function circleError(){
  let r = 120;
  let total = 0;

  for(let p of points){
    let dx = p.x - center.x;
    let dy = p.y - center.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    total += Math.abs(dist - r);
  }

  return total / points.length / 2;
}

/* 🟪 SQUARE ERROR */
function squareError(){
  let size = 200;
  let left = center.x - size/2;
  let right = center.x + size/2;
  let top = center.y - size/2;
  let bottom = center.y + size/2;

  let error = 0;

  for(let p of points){
    let dx = Math.min(
      Math.abs(p.x - left),
      Math.abs(p.x - right)
    );

    let dy = Math.min(
      Math.abs(p.y - top),
      Math.abs(p.y - bottom)
    );

    error += Math.min(dx,dy);
  }

  return error / points.length;
}

/* 🔺 TRIANGLE ERROR */
function triangleError(){
  let A = {x:250, y:120};
  let B = {x:120, y:380};
  let C = {x:380, y:380};

  let error = 0;

  for(let p of points){
    let d1 = distToLine(p,A,B);
    let d2 = distToLine(p,B,C);
    let d3 = distToLine(p,C,A);

    error += Math.min(d1,d2,d3);
  }

  return error / points.length;
}

/* distance to line */
function distToLine(p,a,b){
  let A = p.x - a.x;
  let B = p.y - a.y;
  let C = b.x - a.x;
  let D = b.y - a.y;

  let dot = A*C + B*D;
  let len = C*C + D*D;

  let t = len ? dot/len : 0;

  let x = a.x + t*C;
  let y = a.y + t*D;

  let dx = p.x - x;
  let dy = p.y - y;

  return Math.sqrt(dx*dx + dy*dy);
}

function updateScore(s){
  document.getElementById("score").innerText = "Score: " + s + "%";
}
</script>

</body>
</html>
