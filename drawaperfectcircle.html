<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Shapes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* HEADER */
h1{
  margin-top:15px;
  color:#4c6fff;
  text-shadow:0 0 10px #4c6fff;
}

/* HUB PANEL */
#hub{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#141428;
  color:white;
  border:2px solid #4c6fff;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  box-shadow:0 0 12px #4c6fff;
}

/* CANVAS AREA */
#wrap{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

canvas{
  background:#141428;
  border:3px solid #4c6fff;
  border-radius:10px;
  box-shadow:0 0 20px #4c6fff33;
}
</style>
</head>

<body>

<h1>🌀 Rift Shape Drawer</h1>

<div id="hub">
  <button onclick="setMode('circle')">Circle Mode</button>
  <button onclick="setMode('square')">Square Mode</button>
  <button onclick="setMode('triangle')">Triangle Mode</button>
  <button onclick="clearCanvas()">Clear</button>
</div>

<div id="wrap">
  <canvas id="c" width="500" height="500"></canvas>
</div>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let mode = "circle";

function setMode(m){
  mode = m;
}

/* CLEAR */
function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* CLICK TO DRAW */
canvas.addEventListener("click", function(e){

  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  if(mode === "circle"){
    drawCircle(x,y,40);
  }

  if(mode === "square"){
    drawSquare(x,y,80);
  }

  if(mode === "triangle"){
    drawTriangle(x,y,80);
  }

});

/* PERFECT CIRCLE */
function drawCircle(x,y,r){
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle="#4c6fff";
  ctx.lineWidth=3;
  ctx.shadowBlur=10;
  ctx.shadowColor="#4c6fff";
  ctx.stroke();
}

/* SQUARE */
function drawSquare(x,y,size){
  ctx.strokeStyle="#9b5cff";
  ctx.lineWidth=3;
  ctx.shadowBlur=10;
  ctx.shadowColor="#9b5cff";
  ctx.strokeRect(x-size/2, y-size/2, size, size);
}

/* TRIANGLE */
function drawTriangle(x,y,size){
  ctx.strokeStyle="#00ff99";
  ctx.lineWidth=3;
  ctx.shadowBlur=10;
  ctx.shadowColor="#00ff99";

  ctx.beginPath();
  ctx.moveTo(x, y - size/2);
  ctx.lineTo(x - size/2, y + size/2);
  ctx.lineTo(x + size/2, y + size/2);
  ctx.closePath();
  ctx.stroke();
}
</script>

</body>
</html>
