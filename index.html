<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

/* LEADERBOARD BUTTON */
#lbBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #4c6fff;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  z-index: 999;
}

/* LEADERBOARD PANEL */
#lbPanel {
  position: fixed;
  top: 60px;
  right: 15px;
  width: 260px;
  background: #1a1a2e;
  border: 2px solid #4c6fff;
  border-radius: 12px;
  padding: 10px;
  display: none;
  z-index: 999;
}

#loginScreen {
  text-align: center;
  padding: 100px 20px;
}

#loginScreen input {
  padding: 10px;
  width: 200px;
  margin: 5px;
}

button {
  padding: 8px 15px;
  border: none;
  background: #4c6fff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

header {
  padding: 20px;
  text-align: center;
  background: #1a1a2e;
}

#search {
  margin-top: 10px;
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: none;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 10px;
}

.exclusives-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 10px;
}

.game-card {
  background: #1a1a2e;
  border-radius: 12px;
  text-align: center;
  overflow: hidden;
}

.game-info {
  padding: 10px;
}

footer {
  margin-top: 40px;
  padding: 20px;
  background: #1a1a2e;
  text-align: center;
}

a {
  color: #4c6fff;
  margin: 0 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LEADERBOARD UI -->
<div id="lbBtn" onclick="toggleLB()">🏆</div>

<div id="lbPanel">
  <h3>Leaderboard</h3>

  <button onclick="loadLB('pong')">Pong</button>
  <button onclick="loadLB('2048')">2048</button>
  <button onclick="loadLB('flappy')">Flappy</button>
  <button onclick="loadLB('runner')">Runner</button>
  <button onclick="loadLB('defence')">Defence</button>

  <div id="lbList">Select a game</div>
</div>

<audio id="bgMusic" autoplay loop>
  <source src="magpiemusic-action-trailer-promo-rock-513687.mp3" type="audio/mpeg">
</audio>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<header>
  <h1>🎮 Rift Hub 🎮</h1>
  <p>Welcome, <span id="username"></span></p>
  <input type="text" id="search" placeholder="Search games...">
</header>

<section>
<h2 align="center">Games</h2>

<div class="game-grid">

  <div class="game-card" data-name="pong">
    <div class="game-info">
      <h3>Pong</h3>
      <button onclick="openGame('pong.html','pong')">Play</button>
    </div>
  </div>

  <div class="game-card" data-name="2048">
    <div class="game-info">
      <h3>2048</h3>
      <button onclick="openGame('2048.html','2048')">Play</button>
    </div>
  </div>

  <div class="game-card" data-name="memory">
    <div class="game-info">
      <h3>Memory Match</h3>
      <button onclick="openGame('memory.html','memory')">Play</button>
    </div>
  </div>

</div>
</section>

<section>
<h2 align="center">🔥 Exclusives 🔥</h2>

<div class="exclusives-list">
  <div class="game-card">
    <div class="game-info">
      <h3>Rift Runner</h3>
      <button onclick="openGame('runner.html','runner')">Play</button>
    </div>
  </div>

  <div class="game-card">
    <div class="game-info">
      <h3>Rift Defence</h3>
      <button onclick="openGame('defence.html','defence')">Play</button>
    </div>
  </div>
</div>
</section>

<section>
<h2 align="center">🕘 Recently Played</h2>
<div class="game-grid" id="historyGrid"></div>
</section>

</div>

<footer>
<h3>Rift Hub</h3>
<p>Free browser game platform.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  orderBy,
  limit,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2XQWUKM4SQOazXkm2XwG_e9ZQWpYJi0",
  authDomain: "rifthub-4275a.firebaseapp.com",
  projectId: "rifthub-4275a",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = function () {
  signInWithEmailAndPassword(auth,
    email.value, password.value
  ).then(u => loadUser(u.user.email));
};

window.signup = function () {
  createUserWithEmailAndPassword(auth,
    email.value, password.value
  ).then(u => loadUser(u.user.email));
};

function loadUser(email){
  loginScreen.style.display="none";
  site.style.display="block";
  username.textContent=email;
  bgMusic.volume=0.05;
  bgMusic.play().catch(()=>{});
}

onAuthStateChanged(auth,(u)=>{
  if(u) loadUser(u.email);
});

/* GAME */
window.openGame=function(page,name){
  let h=JSON.parse(localStorage.getItem("riftHistory")||"[]");
  h=h.filter(x=>x.name!==name);
  h.unshift({page,name});
  h=h.slice(0,3);
  localStorage.setItem("riftHistory",JSON.stringify(h));
  location.href=page;
};

function renderHistory(){
  let h=JSON.parse(localStorage.getItem("riftHistory")||"[]");
  historyGrid.innerHTML=h.map(x=>`
    <div class="game-card">
      <div class="game-info">
        <h3>${x.name}</h3>
        <button onclick="openGame('${x.page}','${x.name}')">Play</button>
      </div>
    </div>
  `).join("");
}
renderHistory();

/* SEARCH */
search.oninput=()=>{
  document.querySelectorAll(".game-card").forEach(c=>{
    let n=c.dataset.name;
    if(!n) return;
    c.style.display=n.includes(search.value.toLowerCase())?"block":"none";
  });
};

/* LEADERBOARD */
window.toggleLB=function(){
  lbPanel.style.display =
    lbPanel.style.display==="block"?"none":"block";
};

window.loadLB=async function(game){

  lbList.innerHTML="Loading...";

  const q=query(
    collection(db,"scores"),
    orderBy("score","desc"),
    limit(50)
  );

  const snap=await getDocs(q);

  let html=`<h4>${game.toUpperCase()}</h4>`;
  let rank=1;

  snap.forEach(d=>{
    let x=d.data();
    if(x.game===game && rank<=5){
      html+=`<p>#${rank} ${x.email}<br>Score: ${x.score}</p><hr>`;
      rank++;
    }
  });

  lbList.innerHTML=html||"No scores";
};

</script>

</body>
</html>
