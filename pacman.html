<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub - Pac-Man</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  background: #1a1a2e;
  padding: 15px;
  text-align: center;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  background: #4c6fff;
  color: white;
  cursor: pointer;
}

canvas {
  border: 3px solid #4c6fff;
  background: black;
  margin-top: 20px;
}

#ui {
  margin-top: 10px;
  text-align: center;
}

#score {
  font-size: 18px;
  margin: 5px;
}
</style>
</head>

<body>

<header>
  <h2>🎮 Rift Hub - Pac-Man</h2>
  <button onclick="goBack()">🔙 Back</button>
  <button onclick="restartGame()">🔄 Restart</button>
</header>

<div id="ui">
  <div id="score">Score: 0</div>
</div>

<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tileSize = 30;
const rows = 20;
const cols = 20;

let score = 0;
let gameOver = false;

let map, pacman, ghost, pellets;

function initGame() {
  score = 0;
  gameOver = false;

  map = Array(rows).fill().map(() => Array(cols).fill(0));

  for (let r = 0; r < rows; r++) {
    map[r][0] = 1;
    map[r][cols - 1] = 1;
  }
  for (let c = 0; c < cols; c++) {
    map[0][c] = 1;
    map[rows - 1][c] = 1;
  }

  for (let i = 0; i < 40; i++) {
    map[Math.floor(Math.random() * rows)][Math.floor(Math.random() * cols)] = 1;
  }

  pacman = { x: 1, y: 1, dx: 1, dy: 0, mouth: 0 };

  ghost = { x: cols - 2, y: rows - 2 };

  pellets = [];
  for (let y = 1; y < rows - 1; y++) {
    for (let x = 1; x < cols - 1; x++) {
      if (map[y][x] === 0) pellets.push({ x, y });
    }
  }

  document.getElementById("score").innerText = "Score: 0";
}

function drawMap() {
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (map[y][x] === 1) {
        ctx.fillStyle = "#0044ff";
        ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
      }
    }
  }
}

function drawPellets() {
  ctx.fillStyle = "white";
  pellets.forEach(p => {
    ctx.beginPath();
    ctx.arc(
      p.x * tileSize + tileSize / 2,
      p.y * tileSize + tileSize / 2,
      4,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function drawPacman() {
  const cx = pacman.x * tileSize + tileSize / 2;
  const cy = pacman.y * tileSize + tileSize / 2;

  pacman.mouth += 0.2;
  const open = Math.abs(Math.sin(pacman.mouth)) * 0.4;

  let angle = 0;
  if (pacman.dx === 1) angle = 0;
  if (pacman.dx === -1) angle = Math.PI;
  if (pacman.dy === 1) angle = Math.PI / 2;
  if (pacman.dy === -1) angle = -Math.PI / 2;

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, tileSize / 2 - 2, angle + open, angle + Math.PI * 2 - open);
  ctx.fill();
}

function drawGhost() {
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(
    ghost.x * tileSize + tileSize / 2,
    ghost.y * tileSize + tileSize / 2,
    tileSize / 2 - 2,
    0,
    Math.PI * 2
  );
  ctx.fill();
}

function movePacman() {
  if (gameOver) return;

  let nx = pacman.x + pacman.dx;
  let ny = pacman.y + pacman.dy;

  if (map[ny]?.[nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;
  }

  pellets = pellets.filter(p => {
    if (p.x === pacman.x && p.y === pacman.y) {
      score++;
      document.getElementById("score").innerText = "Score: " + score;
      return false;
    }
    return true;
  });
}

function moveGhost() {
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  const [dx, dy] = dirs[Math.floor(Math.random() * dirs.length)];

  let nx = ghost.x + dx;
  let ny = ghost.y + dy;

  if (map[ny]?.[nx] !== 1) {
    ghost.x = nx;
    ghost.y = ny;
  }
}

function checkGameOver() {
  if (pacman.x === ghost.x && pacman.y === ghost.y) {
    gameOver = true;
    setTimeout(() => {
      alert("Game Over! Score: " + score);
    }, 50);
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") { pacman.dx = 1; pacman.dy = 0; }
  if (e.key === "ArrowLeft") { pacman.dx = -1; pacman.dy = 0; }
  if (e.key === "ArrowUp") { pacman.dx = 0; pacman.dy = -1; }
  if (e.key === "ArrowDown") { pacman.dx = 0; pacman.dy = 1; }
});

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMap();
  drawPellets();
  drawPacman();
  drawGhost();

  movePacman();

  if (Math.random() < 0.2) moveGhost();

  checkGameOver();

  requestAnimationFrame(loop);
}

/* BUTTONS */
function restartGame() {
  initGame();
}

function goBack() {
  window.location.href = "index.html";
}

/* START */
initGame();
loop();
</script>

</body>
</html>
