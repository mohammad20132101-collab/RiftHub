<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rift Hub - Pac-Man</title>

<style>
body {
  margin: 0;
  background: #0f0f1a;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#ui {
  width: 600px;
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

button {
  background: #1a1a2e;
  border: 1px solid #333;
  color: white;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 6px;
}

canvas {
  background: #000;
  border: 2px solid #1a1a2e;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="restart()">Restart</button>
  <button onclick="history.back()">Back</button>
  <div id="stats">Score: 0 | Lives: 3</div>
</div>

<canvas id="c" width="600" height="600"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

const TILE = 30;
const ROWS = 20;
const COLS = 20;

let score, lives;
let pac, ghosts, pellets, fruits;

let fearTimer = 0;

const map = [
"####################",
"#........##........#",
"#.####...##...####.#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"#........##........#",
"#........##........#",
"#.####.######.####.#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"#.####...##...####.#",
"#........##........#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"####################"
];

// ---------- INIT ----------
function reset(){
  score = 0;
  lives = 3;

  pac = {x:10,y:15,dx:0,dy:0};

  ghosts = [
    {x:9,y:9,color:"#ff3b3b",type:"chase"},   // Blinky
    {x:10,y:9,color:"#ff77ff",type:"ambush"}, // Pinky
    {x:9,y:10,color:"#4de1ff",type:"random"},  // Inky
    {x:10,y:10,color:"#ffb347",type:"random"}  // Clyde
  ];

  pellets = [];
  fruits = [];

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(map[y][x]===".") pellets.push({x,y});
    }
  }

  setInterval(spawnFruit, 12000);
}

// ---------- HELPERS ----------
function isWall(x,y){
  return map[y] && map[y][x] === "#";
}

// WRAP TUNNELS
function wrap(entity){
  if(entity.x < 0) entity.x = COLS-1;
  if(entity.x >= COLS) entity.x = 0;
}

// ---------- FRUIT ----------
function spawnFruit(){
  fruits.push({
    x: Math.floor(Math.random()*18)+1,
    y: Math.floor(Math.random()*18)+1,
    timer: 400
  });
}

// ---------- DRAW ----------
function draw(){
  ctx.clearRect(0,0,600,600);

  // maze
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(map[y][x]==="#"){
        ctx.fillStyle = "#111827";
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
      }
    }
  }

  // pellets
  ctx.fillStyle = "#bbb";
  pellets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x*TILE+15,p.y*TILE+15,3,0,Math.PI*2);
    ctx.fill();
  });

  // fruit
  ctx.fillStyle = "#ff4d4d";
  fruits.forEach(f=>{
    ctx.beginPath();
    ctx.arc(f.x*TILE+15,f.y*TILE+15,7,0,Math.PI*2);
    ctx.fill();
  });

  // pacman
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(pac.x*TILE+15,pac.y*TILE+15,12,0.25*Math.PI,1.75*Math.PI);
  ctx.lineTo(pac.x*TILE+15,pac.y*TILE+15);
  ctx.fill();

  // ghosts
  ghosts.forEach(g=>{
    ctx.fillStyle = fearTimer>0 ? "#3b82f6" : g.color;

    ctx.beginPath();
    ctx.arc(g.x*TILE+15,g.y*TILE+15,12,Math.PI,0);
    ctx.lineTo(g.x*TILE+27,g.y*TILE+27);
    ctx.lineTo(g.x*TILE+3,g.y*TILE+27);
    ctx.closePath();
    ctx.fill();
  });
}

// ---------- PAC MOVE ----------
function movePac(){
  let nx = pac.x + pac.dx;
  let ny = pac.y + pac.dy;

  wrap({x:nx}); // visual wrap check

  if(!isWall(nx,ny)){
    pac.x = nx;
    pac.y = ny;
  }

  // pellets
  pellets = pellets.filter(p=>{
    if(p.x===pac.x && p.y===pac.y){
      score += 10;
      return false;
    }
    return true;
  });

  // fruit
  fruits = fruits.filter(f=>{
    if(f.x===pac.x && f.y===pac.y){
      score += 100;
      return false;
    }
    return --f.timer > 0;
  });
}

// ---------- GHOST AI ----------
function ghostMove(g){

  let options = [
    {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
  ].filter(d=>!isWall(g.x+d.x,g.y+d.y));

  if(options.length===0) return;

  let move;

  if(fearTimer>0){
    // RUN AWAY
    move = options[Math.floor(Math.random()*options.length)];
  }
  else if(g.type==="chase"){
    move = options.sort((a,b)=>
      dist(g.x+a.x,g.y+a.y,pac.x,pac.y) -
      dist(g.x+b.x,g.y+b.y,pac.x,pac.y)
    )[0];
  }
  else if(g.type==="ambush"){
    move = options[Math.floor(Math.random()*2)];
  }
  else{
    move = options[Math.floor(Math.random()*options.length)];
  }

  g.x += move.x;
  g.y += move.y;
}

// distance helper
function dist(x1,y1,x2,y2){
  return Math.abs(x1-x2)+Math.abs(y1-y2);
}

// ---------- COLLISION ----------
function check(){
  ghosts.forEach(g=>{
    if(g.x===pac.x && g.y===pac.y){

      if(fearTimer>0){
        g.x=10; g.y=9;
        score+=200;
      } else {
        lives--;
        pac.x=10; pac.y=15;

        if(lives<=0){
          alert("Game Over: "+score);
          restart();
        }
      }
    }
  });
}

// ---------- INPUT ----------
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){pac.dx=1;pac.dy=0;}
  if(e.key==="ArrowLeft"){pac.dx=-1;pac.dy=0;}
  if(e.key==="ArrowUp"){pac.dx=0;pac.dy=-1;}
  if(e.key==="ArrowDown"){pac.dx=0;pac.dy=1;}
});

// ---------- LOOP ----------
let tick=0;

function loop(){

  if(fearTimer>0) fearTimer--;

  draw();

  if(tick%8===0){ // SLOW LIKE REAL PACMAN
    movePac();
    ghosts.forEach(ghostMove);
    check();
  }

  tick++;
  requestAnimationFrame(loop);
}

// ---------- UI ----------
function restart(){
  reset();
  loop();
}

reset();
loop();

</script>
</body>
</html>
