<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub - Arcade Core</title>

<style>
body {
  margin: 0;
  background: #05060a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

canvas {
  background: #000;
  border: 2px solid #111a2b;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(10,15,25,0.85);
  padding: 10px;
  color: white;
  font-size: 14px;
  border-radius: 8px;
  border: 1px solid #1a2233;
}
button {
  background:#111a2b;
  color:white;
  border:1px solid #2a3a55;
  margin-top:5px;
  padding:5px;
}
</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Lives: <span id="lives">3</span><br>
Mode: <span id="mode">Scatter</span><br>
<button onclick="restart()">Restart</button>
<button onclick="history.back()">Back</button>
</div>

<canvas id="c" width="600" height="600"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

const T = 20;
const R = 30;
const C = 30;

let score = 0;
let lives = 3;

/* ===== MODE SYSTEM (CHASE / SCATTER) ===== */
let mode = "scatter";
let modeTimer = 0;

let fear = 0;

/* ===== GRID ===== */
let grid = Array.from({length:R},()=>Array(C).fill(0));

for(let i=0;i<R;i++){
  grid[i][0]=1;
  grid[i][C-1]=1;
}
for(let i=0;i<C;i++){
  grid[0][i]=1;
  grid[R-1][i]=1;
}

/* maze */
for(let i=0;i<140;i++){
  let x = 2 + Math.random()*26|0;
  let y = 2 + Math.random()*26|0;
  if(!(x>10&&x<19&&y>10&&y<19)) grid[y][x]=1;
}

/* ghost house */
for(let y=12;y<=17;y++){
  for(let x=12;x<=17;x++){
    grid[y][x]=1;
  }
}
grid[12][15]=0;

/* ===== PLAYER ===== */
let pac = {x:1,y:1,dx:1,dy:0};

/* ===== GHOSTS ===== */
let ghosts = [
  {x:15,y:14,c:"#ff2d2d",dir:{x:0,y:0}},
  {x:14,y:15,c:"#ff77ff",dir:{x:0,y:0}},
  {x:16,y:15,c:"#00e5ff",dir:{x:0,y:0}},
  {x:15,y:16,c:"#ffb347",dir:{x:0,y:0}}
];

let pellets=[];
for(let y=1;y<R-1;y++){
  for(let x=1;x<C-1;x++){
    if(grid[y][x]===0) pellets.push({x,y});
  }
}

/* ===== POWER PELLETS ===== */
let power=[
  {x:1,y:1},{x:28,y:1},{x:1,y:28},{x:28,y:28}
];

/* ===== HELPERS ===== */
function valid(x,y){
  return grid[y]?.[x]!==1;
}

function wrap(o){
  if(o.x<0)o.x=C-1;
  if(o.x>=C)o.x=0;
  if(o.y<0)o.y=R-1;
  if(o.y>=R)o.y=0;
}

function dist(a,b){
  return Math.abs(a.x-b.x)+Math.abs(a.y-b.y);
}

/* ===== PAC ===== */
function movePac(){
  let nx=pac.x+pac.dx;
  let ny=pac.y+pac.dy;

  wrap({x:nx,y:ny});

  if(valid(nx,ny)){
    pac.x=nx;
    pac.y=ny;
  }

  pellets = pellets.filter(p=>{
    if(p.x===pac.x&&p.y===pac.y){
      score+=10;
      return false;
    }
    return true;
  });

  power = power.filter(p=>{
    if(p.x===pac.x&&p.y===pac.y){
      fear=80;
      return false;
    }
    return true;
  });
}

/* ===== FIXED GHOST AI (NO JITTER) ===== */
function moveGhost(g){
  let dirs=[
    {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
  ];

  // prevent instant reverse
  dirs = dirs.filter(d=>{
    return !(d.x===-g.dir.x && d.y===-g.dir.y);
  });

  let best=null;
  let bestScore=9999;

  for(let d of dirs){
    let nx=g.x+d.x;
    let ny=g.y+d.y;

    if(!valid(nx,ny)) continue;

    let s = dist({x:nx,y:ny}, pac);

    if(mode==="scatter"){
      s = dist({x:nx,y:ny},{x:28,y:28});
    }

    if(fear>0) s*=-1;

    if(s<bestScore){
      bestScore=s;
      best=d;
    }
  }

  if(!best){
    best={x:-g.dir.x,y:-g.dir.y};
  }

  g.x+=best.x;
  g.y+=best.y;
  g.dir=best;

  wrap(g);
}

/* ===== MODE SWITCH ===== */
function updateMode(){
  modeTimer++;
  if(modeTimer<120) mode="scatter";
  else if(modeTimer<300) mode="chase";
  else modeTimer=0;
}

/* ===== COLLISION ===== */
function check(){
  ghosts.forEach(g=>{
    if(g.x===pac.x&&g.y===pac.y){
      if(fear>0){
        score+=100;
        g.x=15;g.y=15;
      }else{
        lives--;
        pac.x=1;pac.y=1;

        if(lives<=0){
          alert("Game Over: "+score);
          location.reload();
        }
      }
    }
  });
}

/* ===== DRAW ===== */
function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,600,600);

  // maze
  for(let y=0;y<R;y++){
    for(let x=0;x<C;x++){
      if(grid[y][x]){
        ctx.fillStyle="#0f1624";
        ctx.fillRect(x*T,y*T,T,T);
      }
    }
  }

  // pellets
  ctx.fillStyle="#bbb";
  pellets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x*T+10,p.y*T+10,2,0,Math.PI*2);
    ctx.fill();
  });

  // power
  ctx.fillStyle="white";
  power.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x*T+10,p.y*T+10,5,0,Math.PI*2);
    ctx.fill();
  });

  // pac
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(pac.x*T+10,pac.y*T+10,8,0,Math.PI*2);
  ctx.fill();

  // ghosts
  ghosts.forEach(g=>{
    ctx.fillStyle = fear>0 ? "#2a6bff" : g.c;
    ctx.beginPath();
    ctx.arc(g.x*T+10,g.y*T+10,8,0,Math.PI*2);
    ctx.fill();
  });

  document.getElementById("score").textContent=score;
  document.getElementById("lives").textContent=lives;
  document.getElementById("mode").textContent=mode.toUpperCase();
}

/* ===== LOOP ===== */
function loop(){
  updateMode();
  movePac();
  ghosts.forEach(moveGhost);
  check();

  if(fear>0) fear--;

  draw();
}

setInterval(loop,140);

/* CONTROLS */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"){pac.dx=0;pac.dy=-1;}
  if(e.key==="ArrowDown"){pac.dx=0;pac.dy=1;}
  if(e.key==="ArrowLeft"){pac.dx=-1;pac.dy=0;}
  if(e.key==="ArrowRight"){pac.dx=1;pac.dy=0;}
});

function restart(){
  location.reload();
}
</script>

</body>
</html>
