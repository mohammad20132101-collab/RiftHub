<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f1a;
    color: white;
    text-align: center;
    overflow: hidden;
}

header {
    background: #1a1a2e;
    padding: 15px;
}

canvas {
    background: #141428;
    border: 3px solid #4c6fff;
    border-radius: 12px;
    margin-top: 10px;
    box-shadow: 0 0 20px #4c6fff55;
}

button {
    background: #4c6fff;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    margin: 5px;
    cursor: pointer;
}

#startScreen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#menu{
    background:#141428;
    border:3px solid #4c6fff;
    border-radius:20px;
    padding:40px;
    width:350px;
    box-shadow:0 0 25px #4c6fff66;
}

#menu h1{
    margin-top:0;
    color:#4c6fff;
}

.modeBtn{
    width:100%;
    margin:8px 0;
    font-size:18px;
}

.modeBtn.selected{
    background:#6e85ff;
    box-shadow:0 0 15px #4c6fff;
}

#startBtn{
    width:100%;
    margin-top:15px;
    font-size:20px;
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7292845069394911"
     crossorigin="anonymous"></script>
</head>

<body>

<header>
  <h1>🏓 Rift Pong</h1>
</header>

<div>
  <button onclick="window.location.href='index.html'">⬅ Back</button>
  <button onclick="location.reload()">Menu</button>
</div>

<div id="startScreen">
  <div id="menu">
    <h1>Rift Pong</h1>
    <p>Select Mode</p>
    <button onclick="chooseMode(1)" class="modeBtn" id="mode1">🤖 1 Player</button>
    <button onclick="chooseMode(2)" class="modeBtn" id="mode2">👥 2 Players</button>
    <button onclick="startGame()" id="startBtn">▶ Start Game</button>
  </div>
</div>

<div style="display:flex;justify-content:center;align-items:center;gap:60px;margin:8px 0;">
  <div style="display:flex;align-items:center;gap:10px;">
    <span contenteditable="true" id="p1Name"
      onkeydown="if(event.key==='Enter')event.preventDefault(); if(this.textContent.length>=12 && event.key.length===1)event.preventDefault()"
      style="color:#ffc;font:18px Lato;white-space:nowrap;overflow:hidden;outline:none;cursor:text;min-width:20px;">Player 1</span>
    <span id="p1Score" style="color:#ffc;font:bold 22px Arial;">0</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="p2Score" style="color:#ffc;font:bold 22px Arial;">0</span>
    <span contenteditable="true" id="p2Name"
      onkeydown="if(event.key==='Enter')event.preventDefault(); if(this.textContent.length>=12 && event.key.length===1)event.preventDefault()"
      style="color:#ffc;font:18px Lato;white-space:nowrap;overflow:hidden;outline:none;cursor:text;min-width:20px;">Player 2</span>
  </div>
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = 1;
let gameStarted = false;

const paddleWidth = 15;
const paddleHeight = 100;

const left = { x: 20, y: 200, score: 0, speed: 5 };
const right = { x: canvas.width - 35, y: 200, score: 0, speed: 7 };

const ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 10,
    vx: 6,
    vy: 4,
    maxSpeed: 14,
    bounceCount: 0
};

const keys = {};

document.addEventListener("keydown", e => {
    const blocked = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "];
    if (blocked.includes(e.key)) e.preventDefault();
    keys[e.key] = true;
}, { passive: false });

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

function chooseMode(m){
    mode = m;
    document.querySelectorAll(".modeBtn").forEach(btn => btn.classList.remove("selected"));
    document.getElementById(m === 1 ? "mode1" : "mode2").classList.add("selected");
}

function startGame(){
    gameStarted = true;
    document.getElementById("startScreen").style.display = "none";
    if (mode === 1) {
        document.getElementById('p1Name').textContent = 'AI';
        document.getElementById('p1Name').contentEditable = 'false';
        document.getElementById('p2Name').textContent = 'Player 1';
        document.getElementById('p2Name').contentEditable = 'true';
    } else {
        document.getElementById('p1Name').textContent = 'Player 1';
        document.getElementById('p1Name').contentEditable = 'true';
        document.getElementById('p2Name').textContent = 'Player 2';
        document.getElementById('p2Name').contentEditable = 'true';
    }
}

function resetBall(dir = 1) {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.vx = 6 * dir;
    ball.vy = (Math.random() * 6 - 3);
    ball.bounceCount = 0;
}

function aiMove() {
    let speed = 4;
    let center = left.y + paddleHeight / 2;
    if (center < ball.y - 20) left.y += speed;
    else if (center > ball.y + 20) left.y -= speed;
}

function bounce(paddle, isLeft) {
    let hit = ball.y - (paddle.y + paddleHeight / 2);
    hit = hit / (paddleHeight / 2);
    let angle = hit * 0.75;
    let dir = isLeft ? 1 : -1;
    ball.vx = dir * Math.abs(ball.vx);
    ball.vy = angle * 6;
    ball.vx *= 1.04;
    ball.vy *= 1.04;
    let speed = Math.sqrt(ball.vx**2 + ball.vy**2);
    if (speed > ball.maxSpeed) {
        ball.vx *= ball.maxSpeed / speed;
        ball.vy *= ball.maxSpeed / speed;
    }
    ball.bounceCount++;
}

function update() {
    if (!gameStarted) return;

    if (keys["ArrowUp"]) right.y -= right.speed;
    if (keys["ArrowDown"]) right.y += right.speed;

    if (mode === 2) {
        if (keys["w"] || keys["W"]) left.y -= left.speed;
        if (keys["s"] || keys["S"]) left.y += left.speed;
    } else {
        aiMove();
    }

    left.y = Math.max(0, Math.min(canvas.height - paddleHeight, left.y));
    right.y = Math.max(0, Math.min(canvas.height - paddleHeight, right.y));

    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.y <= ball.radius || ball.y >= canvas.height - ball.radius) {
        ball.vy *= -1;
        ball.vy *= 0.98;
    }

    if (
        ball.x - ball.radius <= left.x + paddleWidth &&
        ball.y >= left.y &&
        ball.y <= left.y + paddleHeight
    ) {
        bounce(left, true);
    }

    if (
        ball.x + ball.radius >= right.x &&
        ball.y >= right.y &&
        ball.y <= right.y + paddleHeight
    ) {
        bounce(right, false);
    }

    if (ball.bounceCount > 30) {
        resetBall(ball.vx > 0 ? -1 : 1);
    }

    if (ball.x < 0) {
        right.score++;
        resetBall(1);
    }

    if (ball.x > canvas.width) {
        left.score++;
        resetBall(-1);
    }

    document.getElementById("p1Score").textContent = left.score;
    document.getElementById("p2Score").textContent = right.score;
}

function draw() {
    ctx.fillStyle = "rgba(20,20,40,0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = "#4c6fff";
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "#4c6fff";
    ctx.fillRect(left.x, left.y, paddleWidth, paddleHeight);
    ctx.fillRect(right.x, right.y, paddleWidth, paddleHeight);

    ctx.shadowBlur = 15;
    ctx.shadowColor = "white";
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.shadowBlur = 0;
}

chooseMode(1);

document.getElementById('p1Name').addEventListener('focus', () => gameStarted = false);
document.getElementById('p1Name').addEventListener('blur', () => { if(document.getElementById('startScreen').style.display === 'none') gameStarted = true; });
document.getElementById('p2Name').addEventListener('focus', () => gameStarted = false);
document.getElementById('p2Name').addEventListener('blur', () => { if(document.getElementById('startScreen').style.display === 'none') gameStarted = true; });

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
