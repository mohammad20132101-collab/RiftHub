<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift RPS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

h1{
  margin:15px;
  color:#4c6fff;
  text-shadow:0 0 12px #4c6fff;
}

/* MAIN BOX */
#game{
  margin-top:20px;
}

/* SCORE */
#scoreBoard{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:20px;
}

.box{
  background:#141428;
  border:2px solid #4c6fff;
  padding:10px 20px;
  border-radius:10px;
  min-width:120px;
  box-shadow:0 0 15px #4c6fff33;
}

/* RESULT */
#result{
  font-size:22px;
  margin:15px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99;
}

/* BUTTONS */
button{
  background:#141428;
  border:2px solid #4c6fff;
  color:white;
  padding:12px 18px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  transition:0.2s;
  box-shadow:0 0 10px #4c6fff22;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #4c6fff66;
}

#reset{
  margin-top:20px;
  background:#4c6fff;
}
</style>
</head>

<body>

<h1>🌀 Rift Rock Paper Scissors</h1>

<div id="game">

  <div id="scoreBoard">
    <div class="box">You: <span id="playerScore">0</span></div>
    <div class="box">AI: <span id="aiScore">0</span></div>
  </div>

  <div id="result">Choose your move</div>

  <div>
    <button onclick="play('rock')">✊ Rock</button>
    <button onclick="play('paper')">✋ Paper</button>
    <button onclick="play('scissors')">✌ Scissors</button>
  </div>

  <button id="reset" onclick="resetGame()">Reset</button>
  <button onclick="window.location.href='index.html'">Back</button>

</div>

<script>

let player = 0;
let ai = 0;

const resultText = document.getElementById("result");
const pScore = document.getElementById("playerScore");
const aScore = document.getElementById("aiScore");

function play(choice){

  const options = ["rock","paper","scissors"];
  const aiChoice = options[Math.floor(Math.random()*3)];

  let result = "";

  if(choice === aiChoice){
    result = "Draw!";
  }
  else if(
    (choice === "rock" && aiChoice === "scissors") ||
    (choice === "paper" && aiChoice === "rock") ||
    (choice === "scissors" && aiChoice === "paper")
  ){
    result = "You Win!";
    player++;
  }
  else{
    result = "AI Wins!";
    ai++;
  }

  updateUI(choice, aiChoice, result);
}

function updateUI(p, a, r){

  resultText.innerText = `You: ${p} | AI: ${a} → ${r}`;

  pScore.innerText = player;
  aScore.innerText = ai;

  if(r === "You Win!"){
    resultText.style.color = "#00ff99";
  }
  else if(r === "AI Wins!"){
    resultText.style.color = "#ff4d4d";
  }
  else{
    resultText.style.color = "#ffd24d";
  }
}

function resetGame(){
  player = 0;
  ai = 0;

  pScore.innerText = "0";
  aScore.innerText = "0";

  resultText.innerText = "Choose your move";
  resultText.style.color = "#00ff99";
}

</script>

</body>
</html>
