<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>

<style>
@import url("https://fonts.googleapis.com/css?family=Lato:400,700");

body{
  margin:0;
  font-family: 'Lato', Arial, sans-serif;
  background:#0f0f1a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

header{
  width:100%;
  text-align:center;
  padding:15px;
  background:#1a1a2e;
}

canvas{
  background:#050814;
  border:3px solid #4c6fff; 
  border-radius:12px;
  margin-top:15px;
  box-shadow: 0 0 20px rgba(76, 108, 255, 0.2);
}

.score{
  font-size:22px;
  margin:10px;
}

/* BUTTONS MATCHED TO SNAKES & LADDERS UTILITIES */
button {
    background: linear-gradient(135deg, #141428, #222244);
    color: white;
    border: 2px solid rgba(255, 255, 255, 0.2);
    padding: 12px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    transition: 0.2s;
    margin: 5px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

button:hover {
    transform: scale(1.05);
    border-color: white;
}

.btn-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 15px 0;
}
</style>
</head>

<body>

<header>
  <h1>🐍 Snake</h1>
</header>

<div class="score">Score: <span id="score">0</span></div>

<canvas id="game" width="400" height="400"></canvas>

<div class="btn-row">
  <button onclick="window.location.href='index.html'">🏠 Back</button>
  <button onclick="startGame()">Restart</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 20;
const ROWS = 20;
const SIZE = 20;

let snake, food, dx, dy, score, game, speed;

function startGame(){

  snake = [
    {x:10,y:10}
  ];

  food = randomFood();

  dx = 1;
  dy = 0;

  score = 0;
  speed = 150;

  document.getElementById("score").textContent = score;

  clearInterval(game);
  game = setInterval(update, speed);
}

function randomFood(){
  return {
    x: Math.floor(Math.random()*COLS),
    y: Math.floor(Math.random()*ROWS)
  };
}

// GRID-BASED INPUT
document.addEventListener("keydown", e=>{

  if(e.key==="ArrowUp" && dy===0){
    dx=0; dy=-1;
  }
  else if(e.key==="ArrowDown" && dy===0){
    dx=0; dy=1;
  }
  else if(e.key==="ArrowLeft" && dx===0){
    dx=-1; dy=0;
  }
  else if(e.key==="ArrowRight" && dx===0){
    dx=1; dy=0;
  }
});

function update(){

  let head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  // wall collision
  if(
    head.x < 0 ||
    head.y < 0 ||
    head.x >= COLS ||
    head.y >= ROWS
  ){
    gameOver();
    return;
  }

  // self collision
  for(let i=0;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // eat food
  if(head.x===food.x && head.y===food.y){
    score++;
    document.getElementById("score").textContent = score;
    food = randomFood();

    // difficulty scaling
    speed = Math.max(60, 150 - score*4);
    clearInterval(game);
    game = setInterval(update, speed);

  } else {
    snake.pop();
  }

  draw();
}

function draw(){

  ctx.fillStyle="#050814";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // GRID
  ctx.strokeStyle="rgba(255,255,255,0.06)";

  for(let x=0;x<=COLS;x++){
    ctx.beginPath();
    ctx.moveTo(x*SIZE,0);
    ctx.lineTo(x*SIZE,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<=ROWS;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*SIZE);
    ctx.lineTo(canvas.width,y*SIZE);
    ctx.stroke();
  }

  // food (Blue Portal theme)
  ctx.fillStyle="#4c6fff";
  ctx.fillRect(food.x*SIZE, food.y*SIZE, SIZE, SIZE);

  // snake (Swapped green elements with Rift Purple variations)
  for(let i=0;i<snake.length;i++){
    ctx.fillStyle = i===0 ? "#9b5cff" : "#7936dd";
    ctx.fillRect(snake[i].x*SIZE, snake[i].y*SIZE, SIZE, SIZE);
  }
}

function gameOver(){
  clearInterval(game);
  alert("Game Over! Score: " + score);
}

startGame();

document.addEventListener("keydown", function(e) {
  if (
    ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)
  ) {
    e.preventDefault();
  }
});

</script>

</body>
</html>
